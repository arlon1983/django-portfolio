{% load static %}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Arlon — Python, Django & AI-Assisted Development{% endblock %}</title>
<meta name="description" content="I build modern business systems with Python, Django & AI-assisted development — CRM, inventory, booking, insurance, and management systems.">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          void: '#08060f',
          ink: '#0f0b1e',
          magenta: '#ff2d9e',
          cyan: '#00f0ff',
          violet: '#8b5cf6',
        },
        fontFamily: {
          display: ['"Orbitron"', 'sans-serif'],
          body: ['"Rajdhani"', 'sans-serif'],
        },
        boxShadow: {
          'glow-sm': '0 0 12px 0 rgba(255,45,158,0.35)',
          glow: '0 0 30px 4px rgba(139,92,246,0.45)',
        },
      },
    },
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
<link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
</head>
<body class="bg-void text-slate-100 font-body antialiased selection:bg-magenta/40 selection:text-white">

<div class="blob blob-magenta"></div>
<div class="blob blob-cyan"></div>
<div class="blob blob-violet"></div>

<nav class="fixed top-0 inset-x-0 z-50 backdrop-blur-md bg-void/60 border-b border-white/5">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="{% url 'portfolio:home' %}" class="font-display font-bold text-lg tracking-wide">
      <span class="text-glow-cyan">ARLON</span><span class="text-white/50">.dev</span>
    </a>
    <div class="hidden md:flex gap-8 text-sm font-semibold tracking-wide text-slate-300">
      <a href="{% url 'portfolio:services' %}" class="hover:text-cyan transition-colors {% if request.resolver_match.url_name == 'services' %}text-cyan{% endif %}">Services</a>
      <a href="{% url 'portfolio:projects' %}" class="hover:text-magenta transition-colors {% if request.resolver_match.url_name == 'projects' %}text-magenta{% endif %}">Projects</a>
      <a href="{% url 'portfolio:stack' %}" class="hover:text-violet transition-colors {% if request.resolver_match.url_name == 'stack' %}text-violet{% endif %}">Stack</a>
      <a href="{% url 'portfolio:contact' %}" class="hover:text-cyan transition-colors {% if request.resolver_match.url_name == 'contact' %}text-cyan{% endif %}">Contact</a>
    </div>
    <a href="{% url 'portfolio:contact' %}" class="rounded-full px-4 py-2 text-sm font-bold bg-gradient-to-r from-magenta to-violet shadow-glow-sm hover:shadow-glow transition-shadow">
      Start a project
    </a>
  </div>
</nav>

<main class="relative z-10 pt-24">
  {% block content %}{% endblock %}
</main>

<footer class="relative z-10 border-t border-white/5 mt-24">
  <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-center text-sm text-slate-400">
    <p>&copy; {% now "Y" %} Arlon. Built with Django + HTMX.</p>
  </div>
</footer>

{% block extra_js %}{% endblock %}

</body>
</html>
