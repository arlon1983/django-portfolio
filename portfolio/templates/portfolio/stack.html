{% extends "portfolio/base.html" %}

{% block title %}Tech Stack — Arlon{% endblock %}

{% block content %}
<section class="max-w-6xl mx-auto px-6 py-20">
  <div class="text-center mb-10">
    <h2 class="font-display font-bold text-3xl md:text-4xl">
      Tech <span class="text-glow-cyan">stack</span>
    </h2>
    <p class="text-slate-400 mt-3">What I reach for by default — and what's already running behind these projects.</p>
  </div>
  <div class="flex flex-wrap justify-center gap-3">
    {% for tech in tech_stack %}
    <span class="tech-pill rounded-full px-4 py-2 text-sm font-semibold">{{ tech }}</span>
    {% endfor %}
  </div>
</section>
{% endblock %}
