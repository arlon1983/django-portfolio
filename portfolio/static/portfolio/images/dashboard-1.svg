<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#08060f"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Overview</text>
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="16" fill="#8b8fa3">Policies, revenue and open tickets at a glance</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="140" width="330" height="120" rx="16" fill="#ffffff0d" stroke="#ffffff1f"/>
    <text x="90" y="185" font-size="14" fill="#8b8fa3">Active Policies</text>
    <text x="90" y="225" font-size="36" font-weight="700" fill="#00f0ff">1,204</text>

    <rect x="420" y="140" width="330" height="120" rx="16" fill="#ffffff0d" stroke="#ffffff1f"/>
    <text x="450" y="185" font-size="14" fill="#8b8fa3">Revenue (MTD)</text>
    <text x="450" y="225" font-size="36" font-weight="700" fill="#ff2d9e">$48.2k</text>

    <rect x="780" y="140" width="330" height="120" rx="16" fill="#ffffff0d" stroke="#ffffff1f"/>
    <text x="810" y="185" font-size="14" fill="#8b8fa3">Open Tickets</text>
    <text x="810" y="225" font-size="36" font-weight="700" fill="#8b5cf6">12</text>
  </g>

  <g>
    <rect x="60" y="300" width="1080" height="300" rx="16" fill="#ffffff0d" stroke="#ffffff1f"/>
    <text x="90" y="340" font-family="Arial, sans-serif" font-size="16" fill="#8b8fa3">Policy growth — last 7 months</text>
    <g>
      <rect x="110" y="470" width="90" height="90" fill="url(#bar1)" rx="6"/>
      <rect x="230" y="430" width="90" height="130" fill="url(#bar1)" rx="6"/>
      <rect x="350" y="390" width="90" height="170" fill="url(#bar1)" rx="6"/>
      <rect x="470" y="410" width="90" height="150" fill="url(#bar1)" rx="6"/>
      <rect x="590" y="350" width="90" height="210" fill="url(#bar1)" rx="6"/>
      <rect x="710" y="320" width="90" height="240" fill="url(#bar1)" rx="6"/>
      <rect x="830" y="300" width="90" height="260" fill="url(#bar1)" rx="6"/>
    </g>
  </g>

  <text x="60" y="640" font-family="Arial, sans-serif" font-size="14" fill="#4b4f60">.</text>
</svg>
