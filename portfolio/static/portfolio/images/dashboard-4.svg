    <rect x="520" y="300" width="70" height="240" fill="url(#bar4)" rx="6"/>
    <rect x="620" y="260" width="70" height="280" fill="url(#bar4)" rx="6"/>
    <rect x="720" y="230" width="70" height="310" fill="url(#bar4)" rx="6"/>
