  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Revenue</text>
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="16" fill="#8b8fa3">Monthly revenue vs. target</text>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="140" width="1080" height="440" rx="16" fill="#ffffff0d" stroke="#ffffff1f"/>

